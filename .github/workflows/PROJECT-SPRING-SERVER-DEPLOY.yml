name: рҹҡҖ Deploy Spring Server

on:
  push:
    branches: [ deploy ]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: рҹ“Ҙ Checkout repository
        uses: actions/checkout@v4

      - name: вҳ• Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: рҹ”‘ Restore secrets before build
        # firebase нӮӨмҷҖ prod ymlмқ„ л№Ңл“ң м „м—җ ліөмӣҗн•ҙм•ј classpathм—җ нҸ¬н•ЁлҗЁ
        # echoлҠ” shellмқҙ нҒ°л”°мҳҙн‘ңлҘј м ңкұ°н•ҙ JSONмқҙ к№Ём§ҖлҜҖлЎң printf '%s' мӮ¬мҡ©
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' \
            > server/PQL-Web/src/main/resources/firebase-service-account.json
          printf '%s' '${{ secrets.APPLICATION_PROD_YML }}' \
            > server/PQL-Web/src/main/resources/application-prod.yml

      - name: рҹ”Ё Build JAR (Gradle)
        working-directory: server
        run: ./gradlew :PQL-Web:bootJar --no-daemon -q

      - name: рҹҗі Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: рҹҸ— Build & Push Docker image
        working-directory: server
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/passql-server:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: рҹ–Ҙ Deploy to Synology via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/passql-server:latest"

            docker pull "$IMAGE"

            docker stop passql-server 2>/dev/null || true
            docker rm   passql-server 2>/dev/null || true

            docker run -d \
              --name passql-server \
              --restart unless-stopped \
              -p 8080:8080 \
              "$IMAGE"

      - name: рҹ“Ӣ Deployment Summary
        if: always()
        run: |
          echo "## рҹҡҖ passQL м„ңлІ„ л°°нҸ¬ кІ°кіј" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "вң… **л°°нҸ¬ м„ұкіө**" >> $GITHUB_STEP_SUMMARY
            echo "- рҹ“… **мӢңк°„**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            echo "- рҹ”– **м»Өл°Ӣ**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "вқҢ **л°°нҸ¬ мӢӨнҢЁ**" >> $GITHUB_STEP_SUMMARY
            echo "- м»Өл°Ӣ: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Actions нғӯ лЎңк·ёлҘј нҷ•мқён•ҳм„ёмҡ”." >> $GITHUB_STEP_SUMMARY
          fi
