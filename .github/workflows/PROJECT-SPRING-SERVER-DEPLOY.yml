name: 🚀 Deploy Spring Server

on:
  push:
    branches: [ deploy ]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔑 Restore secrets before build
        # firebase 키와 prod yml을 빌드 전에 복원해야 classpath에 포함됨
        # echo는 shell이 큰따옴표를 제거해 JSON이 깨지므로 printf '%s' 사용
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' \
            > server/PQL-Web/src/main/resources/firebase-service-account.json
          printf '%s' '${{ secrets.APPLICATION_PROD_YML }}' \
            > server/PQL-Web/src/main/resources/application-prod.yml

      - name: 🔨 Build JAR (Gradle)
        working-directory: server
        run: ./gradlew :PQL-Web:bootJar --no-daemon -q

      - name: 🐳 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗 Build & Push Docker image
        working-directory: server
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/passql-server:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: 🖥 Deploy to Synology via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 2022
          script: |
            DOCKER=/volume1/@appstore/ContainerManager/usr/bin/docker
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/passql-server:latest"

            $DOCKER pull "$IMAGE"

            $DOCKER stop passql-server 2>/dev/null || true
            $DOCKER rm   passql-server 2>/dev/null || true

            $DOCKER run -d \
              --name passql-server \
              --restart unless-stopped \
              -p 8080:8080 \
              "$IMAGE"

      - name: 📋 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 passQL 서버 배포 결과" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **배포 성공**" >> $GITHUB_STEP_SUMMARY
            echo "- 📅 **시간**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            echo "- 🔖 **커밋**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **배포 실패**" >> $GITHUB_STEP_SUMMARY
            echo "- 커밋: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Actions 탭 로그를 확인하세요." >> $GITHUB_STEP_SUMMARY
          fi
