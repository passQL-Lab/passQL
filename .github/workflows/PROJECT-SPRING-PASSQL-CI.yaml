# ===================================================================
# Spring Boot 빌드 검증 워크플로우 (CI Only) - passQL
# ===================================================================
#
# 설명:
# - main 브랜치 push / PR 시 Gradle 빌드가 정상적으로 되는지만 검증
# - 배포는 수행하지 않음 (deploy 브랜치에서만 배포)
# - server/ 디렉토리 변경 시에만 실행
#
# ===================================================================

name: PROJECT-SPRING-PASSQL-CI

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  pull_request:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  GRADLE_OPTS: "-Dspring.profiles.active=prod"
  APPLICATION_YML_DIR: "server/PQL-Web/src/main/resources"

jobs:
  build-check:
    name: Spring Boot 빌드 검증
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle Wrapper 실행권한 부여
        run: chmod +x server/gradlew

      - name: application-prod.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat > ./${{ env.APPLICATION_YML_DIR }}/application-prod.yml << 'EOF'
${{ secrets.APPLICATION_PROD_YML }}
EOF
          echo "✅ application-prod.yml 파일 생성 완료"

      - name: Build with Gradle (빌드 검증만)
        working-directory: server
        run: ./gradlew clean build -x test ${{ env.GRADLE_OPTS }}

      - name: 빌드 검증 완료
        run: |
          echo "✅ Gradle 빌드 검증이 성공적으로 완료되었습니다!"
          echo ""
          echo "📋 빌드 정보:"
          echo "  🎯 프로젝트: passql-back"
          echo "  🌿 브랜치: ${{ github.ref_name }}"
          echo "  📝 커밋: ${{ github.sha }}"
          echo "  ⏰ 검증 시간: $(date '+%Y-%m-%d %H:%M:%S')"
