# ===================================================================
# Spring Boot 무중단 배포 (Nginx Blue-Green, Synology)
# ===================================================================
#
# deploy 브랜치 푸시 시 Docker 이미지를 빌드하고
# nginx config 의 proxy_pass 포트 토글로 Blue-Green 무중단 배포합니다.
#
# 본 워크플로우는 무중단 배포 옵션입니다.
# 기본 배포는 PROJECT-SPRING-SYNOLOGY-SIMPLE-CICD.yaml 입니다.
# 전환하려면 아래 push.branches 주석 해제 + SIMPLE-CICD 의 push 트리거 주석 처리.
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# APPLICATION_PROD_YML (선택): application-prod.yml 내용
# DOCKERHUB_USERNAME: DockerHub 사용자명
# DOCKERHUB_TOKEN: DockerHub 액세스 토큰
# SERVER_HOST: 배포 서버 주소
# SERVER_USER: SSH 사용자명
# SERVER_PASSWORD: SSH 비밀번호
# ===================================================================
#
# 🔧 환경변수 설정 (env 섹션에서 설정)
# ===================================================================
#
# 🌐 포트 및 컨테이너:
# PROJECT_NAME: 프로젝트명 (컨테이너/이미지 이름)
# DOMAIN_NAME: 외부 도메인 (nginx server_name 과 일치)
# CONTAINER_INTERNAL_PORT: Spring Boot 내부 포트 (기본: 8080)
# BLUE_PORT: Blue 호스트 노출 포트 (기본: 8080)
# GREEN_PORT: Green 호스트 노출 포트 (기본: 8081)
#
# 🔧 Nginx:
# NGINX_RP_CONF: nginx 역방향 프록시 config 파일 경로
# NGINX_BACKUP_DIR: nginx config 백업 디렉토리
# NGINX_BACKUP_KEEP: 백업 보존 개수 (기본: 10)
#
# 📦 볼륨/스토리지:
# ENABLE_VOLUME_MOUNT: 볼륨 마운트 여부 (true/false)
# VOLUME_HOST_PATH: 호스트 볼륨 경로
# VOLUME_CONTAINER_PATH: 컨테이너 내부 마운트 경로
#
# 🔌 SSH 연결:
# SSH_PORT: SSH 포트 (기본: 2022)
# SSH_COMMAND_TIMEOUT: 명령 타임아웃 (기본: 600s)
# SSH_CONNECTION_TIMEOUT: 연결 타임아웃 (기본: 60s)
#
# ⏱️ 헬스체크:
# HEALTHCHECK_PATH: HTTP 경로 (기본: /actuator/health, fallback: /)
# HEALTHCHECK_MAX_RETRIES: 컨테이너 헬스체크 최대 횟수 (기본: 120)
# HEALTHCHECK_RETRY_INTERVAL: 재시도 간격 초 (기본: 1)
# DOMAIN_CHECK_RETRIES: nginx reload 후 도메인 검증 횟수 (기본: 10)
# DOMAIN_CHECK_INTERVAL: 도메인 검증 간격 초 (기본: 2)
# IN_FLIGHT_WAIT: old 컨테이너 제거 전 대기 초 (기본: 5)
#
# 💡 사전 조건:
#   - 서버에 nginx 설치 + sites-enabled config 존재
#   - 해당 config 의 server 블록에 다음 라인 존재:
#       server_name ${DOMAIN_NAME};
#       proxy_pass http://127.0.0.1:${BLUE_PORT};   # 또는 ${GREEN_PORT}
#   - SSH 사용자가 sudo 로 nginx -t / reload, docker 명령 실행 가능
# ===================================================================

name: PROJECT-SPRING-SYNOLOGY-NONSTOP-NGINX-CICD

# ===================================================================
# 트리거 설정
# ===================================================================
# deploy 브랜치 push 자동 트리거는 주석 처리되어 있습니다.
# 본 워크플로우로 전환하려면 아래 push.branches 주석을 해제하세요.
on:
  # push:
  #   branches:
  #     - deploy
  workflow_dispatch:

# ===================================================================
# 환경 변수 설정
# ===================================================================
env:
  # 🔧 프로젝트 설정 - 실제 프로젝트명으로 변경하세요
  PROJECT_NAME: "mapsy-back"
  DOMAIN_NAME: "example.com"

  # ☁️ Spring Boot 설정
  SPRING_PROFILE: "prod"
  JAVA_VERSION: "21"
  GRADLE_OPTS: "-Dspring.profiles.active=prod"

  # 📁 경로 설정
  APPLICATION_YML_DIR: "MS-Web/src/main/resources"
  DOCKERFILE_PATH: "./Dockerfile"

  # 🌐 포트 및 컨테이너 설정
  CONTAINER_INTERNAL_PORT: "8080"
  BLUE_PORT: "8080"
  GREEN_PORT: "8081"

  # 🔧 Nginx 설정
  NGINX_RP_CONF: "/etc/nginx/sites-enabled/example.conf"
  NGINX_BACKUP_DIR: "/volume1/project/nginx/backups"
  NGINX_BACKUP_KEEP: "10"

  # 📦 볼륨 마운트 설정
  ENABLE_VOLUME_MOUNT: "false"
  VOLUME_HOST_PATH: "/volume1/projects/mapsy-back"
  VOLUME_CONTAINER_PATH: "/app"

  # 🔌 SSH 연결 설정
  SSH_PORT: "2022"
  SSH_COMMAND_TIMEOUT: "600s"
  SSH_CONNECTION_TIMEOUT: "60s"

  # ⏱️ 헬스체크 설정
  HEALTHCHECK_PATH: "/actuator/health"
  HEALTHCHECK_MAX_RETRIES: "120"
  HEALTHCHECK_RETRY_INTERVAL: "1"
  DOMAIN_CHECK_RETRIES: "10"
  DOMAIN_CHECK_INTERVAL: "2"
  IN_FLIGHT_WAIT: "5"

jobs:
  # ===================================================================
  # 빌드 작업
  # ===================================================================
  build:
    name: Spring Boot 애플리케이션 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle Wrapper 실행권한 부여
        run: chmod +x gradlew

      - name: application-prod.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/application-prod.yml
          ${{ secrets.APPLICATION_PROD_YML }}
          EOF
          echo "✅ application-prod.yml 파일 생성 완료 (${{ env.APPLICATION_YML_DIR }})"

      - name: Build with Gradle
        run: ./gradlew clean build -x test ${{ env.GRADLE_OPTS }}

      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ===================================================================
  # 배포 작업 (Blue-Green 무중단)
  # ===================================================================
  deploy:
    name: Blue-Green 무중단 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          DOMAIN_NAME: ${{ env.DOMAIN_NAME }}
          SPRING_PROFILE: ${{ env.SPRING_PROFILE }}
          CONTAINER_INTERNAL_PORT: ${{ env.CONTAINER_INTERNAL_PORT }}
          BLUE_PORT: ${{ env.BLUE_PORT }}
          GREEN_PORT: ${{ env.GREEN_PORT }}
          ENABLE_VOLUME_MOUNT: ${{ env.ENABLE_VOLUME_MOUNT }}
          VOLUME_HOST_PATH: ${{ env.VOLUME_HOST_PATH }}
          VOLUME_CONTAINER_PATH: ${{ env.VOLUME_CONTAINER_PATH }}
          NGINX_RP_CONF: ${{ env.NGINX_RP_CONF }}
          NGINX_BACKUP_DIR: ${{ env.NGINX_BACKUP_DIR }}
          NGINX_BACKUP_KEEP: ${{ env.NGINX_BACKUP_KEEP }}
          HEALTHCHECK_MAX_RETRIES: ${{ env.HEALTHCHECK_MAX_RETRIES }}
          HEALTHCHECK_RETRY_INTERVAL: ${{ env.HEALTHCHECK_RETRY_INTERVAL }}
          HEALTHCHECK_PATH: ${{ env.HEALTHCHECK_PATH }}
          DOMAIN_CHECK_RETRIES: ${{ env.DOMAIN_CHECK_RETRIES }}
          DOMAIN_CHECK_INTERVAL: ${{ env.DOMAIN_CHECK_INTERVAL }}
          IN_FLIGHT_WAIT: ${{ env.IN_FLIGHT_WAIT }}
          BRANCH_REF: ${{ github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          command_timeout: ${{ env.SSH_COMMAND_TIMEOUT }}
          timeout: ${{ env.SSH_CONNECTION_TIMEOUT }}
          envs: PROJECT_NAME,DOMAIN_NAME,SPRING_PROFILE,CONTAINER_INTERNAL_PORT,BLUE_PORT,GREEN_PORT,ENABLE_VOLUME_MOUNT,VOLUME_HOST_PATH,VOLUME_CONTAINER_PATH,NGINX_RP_CONF,NGINX_BACKUP_DIR,NGINX_BACKUP_KEEP,HEALTHCHECK_MAX_RETRIES,HEALTHCHECK_RETRY_INTERVAL,HEALTHCHECK_PATH,DOMAIN_CHECK_RETRIES,DOMAIN_CHECK_INTERVAL,IN_FLIGHT_WAIT,BRANCH_REF,DOCKERHUB_USERNAME,SERVER_PASSWORD
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            export PW="${SERVER_PASSWORD}"

            IMAGE="${DOCKERHUB_USERNAME}/${PROJECT_NAME}:${BRANCH_REF}"
            BLUE_CONTAINER_NAME="${PROJECT_NAME}-blue"
            GREEN_CONTAINER_NAME="${PROJECT_NAME}-green"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Nginx Blue-Green 무중단 배포 시작"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 프로젝트: ${PROJECT_NAME}"
            echo "🌐 도메인: ${DOMAIN_NAME}"
            echo "🖼️ 이미지: ${IMAGE}"
            echo "🎨 Blue=${BLUE_PORT} | Green=${GREEN_PORT}"
            echo "🔧 Nginx config: ${NGINX_RP_CONF}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ============================================================
            # 1. 최신 이미지 Pull
            # ============================================================
            echo "📥 이미지 Pull: ${IMAGE}"
            echo "$PW" | sudo -S docker pull "${IMAGE}"

            # ============================================================
            # 2. nginx 설정 백업
            # ============================================================
            echo "📁 nginx 백업 디렉토리 생성: ${NGINX_BACKUP_DIR}"
            echo "$PW" | sudo -S mkdir -p "${NGINX_BACKUP_DIR}"

            BACKUP_FILE="${NGINX_BACKUP_DIR}/server.ReverseProxy.conf.$(date +%Y%m%d_%H%M%S).bak"
            echo "💾 nginx config 백업: ${BACKUP_FILE}"
            echo "$PW" | sudo -S cp "${NGINX_RP_CONF}" "${BACKUP_FILE}"

            # ============================================================
            # 3. 현재 활성 포트 판별 (nginx config proxy_pass 파싱)
            # ============================================================
            echo "🔍 nginx config 의 현재 활성 포트 탐색"
            ACTIVE_PORT=$(
              printf '%s\n' "$PW" | sudo -S awk -v dom="${DOMAIN_NAME}" '
                BEGIN {
                  inserver=0; depth=0; entry_depth=0;
                  dom_esc = dom;
                  gsub(/[.[\]()+*?^$\\|]/, "\\\\&", dom_esc);
                }
                {
                  raw = $0;
                  line = raw;
                  sub(/#.*/, "", line);
                  depth += gsub(/\{/, "{", line);
                  depth -= gsub(/\}/, "}", line);

                  if (!inserver && line ~ /^[[:space:]]*server_name[[:space:]]+/) {
                    tmp = line;
                    sub(/^[[:space:]]*server_name[[:space:]]+/, "", tmp);
                    sub(/[[:space:]]*;.*/, "", tmp);
                    if (match(tmp, "(^|[[:space:]])" dom_esc "([[:space:]]|$)")) {
                      inserver=1; entry_depth=depth;
                    }
                  }

                  if (inserver && line ~ /proxy_pass[[:space:]]+https?:\/\/(localhost|127\.0\.0\.1):[0-9]{2,5}/) {
                    if (match(line, /https?:\/\/(localhost|127\.0\.0\.1):([0-9]{2,5})/, a)) { print a[2]; exit }
                  }

                  if (inserver && (depth < entry_depth || (depth==0 && entry_depth==0))) inserver=0;
                }
              ' "${NGINX_RP_CONF}" || true
            )

            if [ -z "${ACTIVE_PORT}" ]; then
              echo "⚠️ 활성 포트를 찾지 못함 → 기본값(BLUE=${BLUE_PORT})을 활성으로 간주"
              ACTIVE_PORT="${BLUE_PORT}"
            fi
            echo "🎨 현재 활성 포트: ${ACTIVE_PORT}"

            if [ "${ACTIVE_PORT}" = "${BLUE_PORT}" ]; then
              NEW_PORT="${GREEN_PORT}"
              NEW_CONTAINER_NAME="${GREEN_CONTAINER_NAME}"
              OLD_CONTAINER_NAME="${BLUE_CONTAINER_NAME}"
            else
              NEW_PORT="${BLUE_PORT}"
              NEW_CONTAINER_NAME="${BLUE_CONTAINER_NAME}"
              OLD_CONTAINER_NAME="${GREEN_CONTAINER_NAME}"
            fi

            echo "🐳 신규 배포 → 포트=${NEW_PORT} 컨테이너=${NEW_CONTAINER_NAME}"
            echo "🗑️ 이전 컨테이너 (제거 예정) = ${OLD_CONTAINER_NAME}"

            # ============================================================
            # 4. 동일 슬롯(idle 쪽) 잔존 컨테이너 정리
            # ============================================================
            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^${NEW_CONTAINER_NAME}\$"; then
              echo "🗑️ idle 슬롯 정리: ${NEW_CONTAINER_NAME}"
              echo "$PW" | sudo -S docker rm -f "${NEW_CONTAINER_NAME}"
            fi

            # ============================================================
            # 5. 볼륨 마운트 옵션 구성
            # ============================================================
            VOLUME_MOUNT_OPTION="-v /etc/localtime:/etc/localtime:ro"
            if [ "${ENABLE_VOLUME_MOUNT}" = "true" ]; then
              if [ ! -d "${VOLUME_HOST_PATH}" ]; then
                echo "📁 볼륨 마운트 디렉토리 생성: ${VOLUME_HOST_PATH}"
                echo "$PW" | sudo -S mkdir -p "${VOLUME_HOST_PATH}"
              fi
              VOLUME_MOUNT_OPTION="${VOLUME_MOUNT_OPTION} -v ${VOLUME_HOST_PATH}:${VOLUME_CONTAINER_PATH}"
              echo "📦 볼륨 마운트 활성화: ${VOLUME_HOST_PATH} → ${VOLUME_CONTAINER_PATH}"
            else
              echo "ℹ️ 볼륨 마운트 비활성화됨"
            fi

            # ============================================================
            # 6. 새 컨테이너 기동
            # ============================================================
            echo "🐳 새 컨테이너 기동: ${NEW_CONTAINER_NAME} (포트 ${NEW_PORT})"
            echo "$PW" | sudo -S docker run -d \
              -p ${NEW_PORT}:${CONTAINER_INTERNAL_PORT} \
              --name "${NEW_CONTAINER_NAME}" \
              -e TZ=Asia/Seoul \
              -e "SPRING_PROFILES_ACTIVE=${SPRING_PROFILE}" \
              ${VOLUME_MOUNT_OPTION} \
              "${IMAGE}"

            # ============================================================
            # 7. 컨테이너 헬스체크 (로컬 포트 직접 호출)
            # ============================================================
            echo "⏳ 헬스체크 시작 (최대 ${HEALTHCHECK_MAX_RETRIES}회 × ${HEALTHCHECK_RETRY_INTERVAL}초)"
            HEALTHCHECK_SUCCESS=false
            for i in $(seq 1 ${HEALTHCHECK_MAX_RETRIES}); do
              if curl -fsS "http://127.0.0.1:${NEW_PORT}${HEALTHCHECK_PATH}" >/dev/null 2>&1 || \
                 curl -fsS "http://127.0.0.1:${NEW_PORT}/" >/dev/null 2>&1 ; then
                echo "✅ 헬스체크 성공 (시도 ${i})"
                HEALTHCHECK_SUCCESS=true
                break
              fi
              echo "⏳ 헬스체크 진행중... (${i}/${HEALTHCHECK_MAX_RETRIES})"
              sleep ${HEALTHCHECK_RETRY_INTERVAL}
            done

            if [ "${HEALTHCHECK_SUCCESS}" != "true" ]; then
              echo "❌ 헬스체크 실패 → 배포 중단"
              echo "$PW" | sudo -S docker logs --tail 200 "${NEW_CONTAINER_NAME}" || true
              echo "🗑️ 신규 컨테이너 정리: ${NEW_CONTAINER_NAME}"
              echo "$PW" | sudo -S docker rm -f "${NEW_CONTAINER_NAME}" || true
              exit 1
            fi

            # ============================================================
            # 8. nginx config 포트 토글 (proxy_pass 포트 치환)
            # ============================================================
            echo "🔧 nginx config 포트 토글: ${ACTIVE_PORT} → ${NEW_PORT}"
            TMP_FILE="$(mktemp)"
            sudo awk -v dom="${DOMAIN_NAME}" -v new_port="${NEW_PORT}" '
              BEGIN {
                inserver=0; depth=0; entry_depth=0;
                dom_esc = dom;
                gsub(/[.[\]()+*?^$\\|]/, "\\\\&", dom_esc);
              }
              {
                if ($0 ~ "server_name[[:space:]]+" dom_esc "[[:space:]]*;") {
                  inserver=1;
                  entry_depth=depth;
                }

                line = $0;
                sub(/#.*/, "", line);
                depth += gsub(/\{/, "{", line);
                depth -= gsub(/\}/, "}", line);

                if (inserver && \
                    $0 !~ /^[[:space:]]*#/ && \
                    $0 ~ /proxy_pass[[:space:]]+https?:\/\/(localhost|127\.0\.0\.1):[0-9]{2,5}/) {
                  sub(/:[0-9]{2,5}/, ":" new_port);
                }

                print;

                if (inserver && (depth < entry_depth || (depth == 0 && entry_depth == 0))) {
                  inserver=0;
                }
              }
            ' "${NGINX_RP_CONF}" > "${TMP_FILE}"

            # ============================================================
            # 9. nginx 설정 검증 + reload (실패 시 백업 복구)
            # ============================================================
            echo "🔧 nginx 설정 적용 및 검증"
            echo "$PW" | sudo -S cp "${TMP_FILE}" "${NGINX_RP_CONF}"
            if ! (echo "$PW" | sudo -S nginx -t); then
              echo "❌ nginx 설정 검증 실패 → 백업 파일로 복구"
              echo "$PW" | sudo -S cp "${BACKUP_FILE}" "${NGINX_RP_CONF}"
              echo "$PW" | sudo -S rm -f "${BACKUP_FILE}"
              rm -f "${TMP_FILE}"
              echo "🗑️ 신규 컨테이너 정리: ${NEW_CONTAINER_NAME}"
              echo "$PW" | sudo -S docker rm -f "${NEW_CONTAINER_NAME}" || true
              exit 1
            fi
            echo "✅ nginx 설정 검증 성공"
            rm -f "${TMP_FILE}"

            echo "🔄 nginx reload"
            if ! (echo "$PW" | sudo -S systemctl reload nginx); then
              echo "⚠️ reload 실패 → restart 시도"
              if ! (echo "$PW" | sudo -S systemctl restart nginx); then
                echo "❌ nginx reload/restart 실패 → 백업 복구"
                echo "$PW" | sudo -S cp "${BACKUP_FILE}" "${NGINX_RP_CONF}"
                echo "$PW" | sudo -S systemctl restart nginx
                echo "$PW" | sudo -S rm -f "${BACKUP_FILE}"
                echo "🗑️ 신규 컨테이너 정리: ${NEW_CONTAINER_NAME}"
                echo "$PW" | sudo -S docker rm -f "${NEW_CONTAINER_NAME}" || true
                exit 1
              fi
            fi

            # ============================================================
            # 10. 도메인 접근 검증
            # ============================================================
            echo "🌐 도메인 접근 검증 (${DOMAIN_NAME})"
            DOMAIN_OK=false
            for i in $(seq 1 ${DOMAIN_CHECK_RETRIES}); do
              if curl -fsS "https://${DOMAIN_NAME}${HEALTHCHECK_PATH}" >/dev/null 2>&1 || \
                 curl -fsS "https://${DOMAIN_NAME}/" >/dev/null 2>&1 ; then
                echo "✅ 도메인 접근 검증 성공 (시도 ${i})"
                DOMAIN_OK=true
                break
              fi
              echo "⏳ 도메인 접근 검증 중... (${i}/${DOMAIN_CHECK_RETRIES})"
              sleep ${DOMAIN_CHECK_INTERVAL}
            done

            if [ "${DOMAIN_OK}" != "true" ]; then
              echo "⚠️ 도메인 접근 검증 실패: 배포 진행 (DNS 전파 지연 가능성)"
            fi

            # ============================================================
            # 11. 이전 컨테이너 제거
            # ============================================================
            echo "⏱️ in-flight 요청 처리 대기 (${IN_FLIGHT_WAIT}초)"
            sleep ${IN_FLIGHT_WAIT}

            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^${OLD_CONTAINER_NAME}\$"; then
              echo "🗑️ old=${OLD_CONTAINER_NAME} 제거"
              echo "$PW" | sudo -S docker rm -f "${OLD_CONTAINER_NAME}" || true
            else
              echo "ℹ️ old=${OLD_CONTAINER_NAME} 없음 — 정리 생략"
            fi

            # ============================================================
            # 12. dangling 이미지 정리 + 백업 보존
            # ============================================================
            echo "🧹 dangling(<none>) 이미지 정리..."
            echo "$PW" | sudo -S docker image prune -af

            echo "🧹 백업 파일 최신 ${NGINX_BACKUP_KEEP}개 보존"
            KEEP_PLUS_ONE=$((NGINX_BACKUP_KEEP + 1))
            echo "$PW" | sudo -S /bin/bash -c "ls -1t '${NGINX_BACKUP_DIR}'/server.ReverseProxy.conf.*.bak 2>/dev/null | tail -n +${KEEP_PLUS_ONE} | xargs -r rm -f"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ 무중단 배포 완료. active=${NEW_CONTAINER_NAME} (포트 ${NEW_PORT})"
            echo "🌐 도메인: https://${DOMAIN_NAME}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

