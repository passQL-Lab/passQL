name: 🚀 Deploy to Vercel

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [ deploy ]
  workflow_dispatch:

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 🔧 Install dependencies
        working-directory: client
        run: npm ci

      - name: ☁️ Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔍 Verify Vercel Secrets
        run: |
          echo "🔐 Checking Vercel configuration..."
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ VERCEL_ORG_ID is not set"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ VERCEL_PROJECT_ID is not set"
            exit 1
          fi
          echo "✅ All Vercel secrets are configured"

      - name: 📥 Pull Vercel Environment Information
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build Project Artifacts
        working-directory: client
        run: |
          for i in {1..3}; do
            echo "🔄 Build attempt $i/3"
            if vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}; then
              echo "✅ Build successful"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "💥 All build attempts failed"
              exit 1
            fi
            echo "⏰ Retrying in 10s..."
            sleep 10
          done

      - name: 🚀 Deploy to Vercel Production
        id: deploy
        working-directory: client
        run: |
          for i in {1..3}; do
            echo "🔄 Deploy attempt $i/3"
            LOG=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1)
            DEPLOY_EXIT=$?
            echo "$LOG"
            if [ $DEPLOY_EXIT -eq 0 ]; then
              echo "✅ Deployment successful"
              URL=$(echo "$LOG" | grep -oE "https://[^[:space:]]*\.vercel\.app" | tail -1)
              echo "deployment_url=${URL:-https://pass-ql.vercel.app}" >> $GITHUB_OUTPUT
              break
            fi
            if [ $i -eq 3 ]; then
              echo "💥 All deploy attempts failed"
              exit 1
            fi
            echo "⏰ Retrying in $((i * 15))s..."
            sleep $((i * 15))
          done

      - name: 📋 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 passQL 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **배포 성공**" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 **URL**: ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
            echo "- 📅 **시간**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **배포 실패**" >> $GITHUB_STEP_SUMMARY
            echo "- 커밋: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 브랜치: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          fi
