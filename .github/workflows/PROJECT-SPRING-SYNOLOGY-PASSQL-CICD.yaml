# ===================================================================
# Spring Boot 전용 CI/CD 배포 워크플로우 - passQL
# ===================================================================

name: PROJECT-SPRING-SYNOLOGY-CICD

on:
  push:
    branches:
      - deploy
    paths:
      - 'server/**'
  workflow_dispatch:

env:
  PROJECT_NAME: "passql-back"
  DOCKER_IMAGE_PREFIX: "back-container"
  SPRING_PROFILE: "prod"
  JAVA_VERSION: "21"
  GRADLE_OPTS: "-Dspring.profiles.active=prod"
  APPLICATION_YML_DIR: "server/PQL-Web/src/main/resources"
  DEPLOY_PORT: "8097"
  VOLUME_HOST_PATH: "/volume1/projects/passql/backend"
  VOLUME_CONTAINER_PATH: "/mnt"

jobs:
  build:
    name: Spring Boot 애플리케이션 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle Wrapper 실행권한 부여
        run: chmod +x server/gradlew

      - name: application-prod.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          printf '%s' '${{ secrets.APPLICATION_PROD_YML }}' > ./${{ env.APPLICATION_YML_DIR }}/application-prod.yml
          echo "✅ application-prod.yml 파일 생성 완료"

      - name: Firebase 서비스 계정 JSON 생성 (prod)
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > ./${{ env.APPLICATION_YML_DIR }}/firebase-service-account.json
          echo "✅ firebase-service-account.json 생성 완료"

      - name: Build with Gradle
        working-directory: server
        run: ./gradlew clean build -x test ${{ env.GRADLE_OPTS }}

      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('server/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}-${{ env.DOCKER_IMAGE_PREFIX }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: 원격 서버 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 2022
          command_timeout: 600s
          timeout: 60s
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            export PW=${{ secrets.SERVER_PASSWORD }}
            BRANCH=${{ github.ref_name }}
            PROJECT_NAME="${{ env.PROJECT_NAME }}"
            CONTAINER_NAME="${PROJECT_NAME}"
            PORT=${{ env.DEPLOY_PORT }}

            echo "⬇️ Docker 이미지 풀 중..."
            echo $PW | sudo -S docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}

            if echo $PW | sudo -S docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "🧹 기존 컨테이너 삭제 중..."
              echo $PW | sudo -S docker rm -f $CONTAINER_NAME
            fi

            echo $PW | sudo -S mkdir -p "${{ env.VOLUME_HOST_PATH }}"

            echo "🚀 컨테이너 실행 중..."
            echo $PW | sudo -S docker run -d \
              -p ${PORT}:8080 \
              --name $CONTAINER_NAME \
              -e TZ=Asia/Seoul \
              -e "SPRING_PROFILES_ACTIVE=${{ env.SPRING_PROFILE }}" \
              -v /etc/localtime:/etc/localtime:ro \
              -v ${{ env.VOLUME_HOST_PATH }}:${{ env.VOLUME_CONTAINER_PATH }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}

            echo "⏳ 컨테이너 초기화 대기 중... (15초)"
            sleep 15

            echo "🏥 헬스체크 중..."
            if echo $PW | sudo -S docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "✅ 컨테이너 정상 실행 중"
            else
              echo "❌ 컨테이너 실행 실패"
              echo $PW | sudo -S docker logs $CONTAINER_NAME || true
              exit 1
            fi

            echo "✅ 배포 완료: http://${{ secrets.SERVER_HOST }}:${PORT}"
