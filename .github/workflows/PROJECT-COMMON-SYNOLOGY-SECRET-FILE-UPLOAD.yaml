# ===================================================================
# PROJECT-COMMON-SYNOLOGY-SECRET-FILE-UPLOAD.yaml
# GitHub Secret 파일 Synology NAS 자동 업로드
# ===================================================================
#
# GitHub Secrets에 저장된 설정 파일들을 Synology NAS에
# 자동 업로드하여 변경 이력을 추적합니다.
# 타임스탬프 기반 백업으로 변경 히스토리를 보존합니다.
#
# ===================================================================
# 🤖 AI 에이전트 커스텀 가이드
# ===================================================================
# 이 워크플로우를 프로젝트에 맞게 수정하려면,
# 아래 프롬프트를 AI 에이전트에게 전달하세요:
#
# 📋 프롬프트:
# "PROJECT-COMMON-SYNOLOGY-SECRET-FILE-UPLOAD.yaml을
#  프로젝트에 맞게 수정해줘.
#  - 프로젝트명: {프로젝트명}
#  - 역할(ROLE): {backend/frontend 등}
#  - Synology 경로: {NAS 저장 경로}
#  - SSH 포트: {포트번호}
#  - 업로드할 GitHub Secrets:
#    SECRET_KEY → 저장할_파일명.확장자
#  기존 파일 목록 섹션에 추가하고,
#  없는 Secret은 스킵하도록 해줘."
#
# 💡 예시:
# "- APPLICATION_PROD_YML → application-prod.yml
#  - FIREBASE_KEY_JSON → firebase-admin-sdk.json
#  - VERTEX_SA_KEY → vertex-sa-key.json
#  - ADMIN_YML → admin.yml"
# ===================================================================
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# SERVER_HOST: Synology NAS 주소
# SERVER_USER: SSH 사용자명
# SERVER_PASSWORD: SSH 비밀번호
# ===================================================================
#
# 🔧 환경변수 설정 (env 섹션에서 설정)
# ===================================================================
#
# 📦 프로젝트 설정:
# PROJECT_NAME: 프로젝트명 (NAS 경로에 사용)
# ROLE: 역할 구분 (backend, frontend 등)
# SYNOLOGY_BASE_PATH: NAS 기본 경로 (기본: /volume1/projects)
#
# 🔌 SSH 연결:
# SSH_PORT: SSH 포트 (기본: 2022)
# ===================================================================

name: PROJECT-COMMON-SYNOLOGY-SECRET-FILE-UPLOAD

# ===================================================================
# 트리거 설정
# ===================================================================
# main 브랜치에 push할 때 자동 실행됩니다.
# workflow_dispatch로 수동 실행도 가능합니다.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: synology-secret-file-upload-${{ github.ref }}
  cancel-in-progress: true

# ===================================================================
# 환경 변수 설정
# ===================================================================
env:
  # 🔧 프로젝트 설정 - 프로젝트에 맞게 수정하세요
  PROJECT_NAME: "passql"
  ROLE: "backend"
  SYNOLOGY_BASE_PATH: "/volume1/projects"
  SSH_PORT: "2022"

jobs:
  upload-secret-files:
    name: Secret 파일 업로드
    runs-on: ubuntu-latest
    # [skip ci] 커밋 메시지가 포함된 경우 실행하지 않음
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: 타임스탬프 및 커밋 정보 생성
        run: |
          export TZ='Asia/Seoul'
          TIMESTAMP=$(date '+%Y-%m-%d_%H-%M-%S')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV
          echo "SHORT_COMMIT_HASH=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_ENV
          echo "생성된 타임스탬프: $TIMESTAMP"

      - name: Secret 파일 업로드
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e

            # GitHub Actions 환경변수 직접 설정
            PROJECT_NAME="${{ env.PROJECT_NAME }}"
            ROLE="${{ env.ROLE }}"
            SYNOLOGY_BASE_PATH="${{ env.SYNOLOGY_BASE_PATH }}"
            TIMESTAMP="${{ env.TIMESTAMP }}"
            SHORT_COMMIT_HASH="${{ env.SHORT_COMMIT_HASH }}"
            BUILD_DATE="${{ env.BUILD_DATE }}"

            # 경로 설정
            BASE_DIR="${SYNOLOGY_BASE_PATH}/${PROJECT_NAME}/github_secret/${ROLE}"

            echo "=== Secret 파일 업로드 시작 ==="
            echo "프로젝트: ${PROJECT_NAME} (${ROLE})"
            echo "경로: ${BASE_DIR}"
            echo "타임스탬프: ${TIMESTAMP}"

            # 디렉토리 생성
            export PW="${{ secrets.SERVER_PASSWORD }}"
            echo "$PW" | sudo -S mkdir -p "${BASE_DIR}/${TIMESTAMP}"

            # ============================================
            # 📦 파일 업로드 섹션
            # Secret이 비어있으면 자동 스킵됩니다.
            # AI 에이전트로 이 섹션에 파일을 추가하세요.
            # ============================================

            # --- APPLICATION_PROD_YML → application-prod.yml (Spring Backend) ---
            cat << '__SUH_SECRET_CHECK_EOF__' > /tmp/_secret_check
            ${{ secrets.APPLICATION_PROD_YML }}
            __SUH_SECRET_CHECK_EOF__
            if [ -s /tmp/_secret_check ] && [ -n "$(tr -d '[:space:]' < /tmp/_secret_check)" ]; then
              echo "APPLICATION_PROD_YML → application-prod.yml 업로드 중..."
              cat << '__SUH_FILE_CONTENT_EOF__' | sudo tee "${BASE_DIR}/application-prod.yml" > /dev/null
            ${{ secrets.APPLICATION_PROD_YML }}
            __SUH_FILE_CONTENT_EOF__
              cat << '__SUH_FILE_CONTENT_EOF__' | sudo tee "${BASE_DIR}/${TIMESTAMP}/application-prod.yml" > /dev/null
            ${{ secrets.APPLICATION_PROD_YML }}
            __SUH_FILE_CONTENT_EOF__
              echo "application-prod.yml 업로드 완료"
            else
              echo "APPLICATION_PROD_YML 스킵 (Secret 미설정)"
            fi
            rm -f /tmp/_secret_check

            # --- FIREBASE_SERVICE_ACCOUNT_PROD_JSON → firebase-service-account-prod.json (Spring Backend) ---
            cat << '__SUH_SECRET_CHECK_EOF__' > /tmp/_secret_check
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_JSON }}
            __SUH_SECRET_CHECK_EOF__
            if [ -s /tmp/_secret_check ] && [ -n "$(tr -d '[:space:]' < /tmp/_secret_check)" ]; then
              echo "FIREBASE_SERVICE_ACCOUNT_PROD_JSON → firebase-service-account-prod.json 업로드 중..."
              cat << '__SUH_FILE_CONTENT_EOF__' | sudo tee "${BASE_DIR}/firebase-service-account-prod.json" > /dev/null
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_JSON }}
            __SUH_FILE_CONTENT_EOF__
              cat << '__SUH_FILE_CONTENT_EOF__' | sudo tee "${BASE_DIR}/${TIMESTAMP}/firebase-service-account-prod.json" > /dev/null
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_JSON }}
            __SUH_FILE_CONTENT_EOF__
              echo "firebase-service-account-prod.json 업로드 완료"
            else
              echo "FIREBASE_SERVICE_ACCOUNT_PROD_JSON 스킵 (Secret 미설정)"
            fi
            rm -f /tmp/_secret_check

            # --- AI_ENV_FILE → ai/.env (AI Server) ---
            cat << '__SUH_SECRET_CHECK_EOF__' > /tmp/_secret_check
            ${{ secrets.AI_ENV_FILE }}
            __SUH_SECRET_CHECK_EOF__
            if [ -s /tmp/_secret_check ] && [ -n "$(tr -d '[:space:]' < /tmp/_secret_check)" ]; then
              echo "AI_ENV_FILE → ai.env 업로드 중..."
              cat << '__SUH_FILE_CONTENT_EOF__' | sudo tee "${BASE_DIR}/ai.env" > /dev/null
            ${{ secrets.AI_ENV_FILE }}
            __SUH_FILE_CONTENT_EOF__
              cat << '__SUH_FILE_CONTENT_EOF__' | sudo tee "${BASE_DIR}/${TIMESTAMP}/ai.env" > /dev/null
            ${{ secrets.AI_ENV_FILE }}
            __SUH_FILE_CONTENT_EOF__
              echo "ai.env 업로드 완료"
            else
              echo "AI_ENV_FILE 스킵 (Secret 미설정)"
            fi
            rm -f /tmp/_secret_check

            # ============================================
            # 📋 메타데이터 JSON 생성
            # ============================================
            cat << EOF | sudo tee "${BASE_DIR}/${TIMESTAMP}/cicd-gitignore-file.json" > /dev/null
            {
              "build_info": {
                "timestamp": "$TIMESTAMP",
                "workflow": "Secret 파일 자동 업로드",
                "run_id": "${{ github.run_id }}",
                "run_number": "${{ github.run_number }}",
                "event": "${{ github.event_name }}",
                "repository": "${{ github.repository }}",
                "branch": "${{ github.ref_name }}",
                "commit_hash": "${{ github.sha }}",
                "short_hash": "$SHORT_COMMIT_HASH",
                "commit_url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}",
                "actor": "${{ github.actor }}",
                "build_date": "$BUILD_DATE"
              },
              "files": [
                {
                  "secret_name": "APPLICATION_PROD_YML",
                  "file_name": "application-prod.yml",
                  "description": "Spring Boot prod profile",
                  "last_updated": "$BUILD_DATE"
                },
                {
                  "secret_name": "AI_ENV_FILE",
                  "file_name": "ai.env",
                  "description": "AI FastAPI server env",
                  "last_updated": "$BUILD_DATE"
                }
              ]
            }
            EOF

            # 타임스탬프 인덱스 업데이트
            echo "{\"last_updated\": \"${TIMESTAMP}\", \"commit\": \"${SHORT_COMMIT_HASH}\", \"actor\": \"${{ github.actor }}\", \"status\": \"completed\"}" | sudo tee "${BASE_DIR}/timestamp_index.json" > /dev/null

            echo "=== 모든 파일 업로드 완료 ==="
