# ===================================================================
# Spring Boot 무중단 배포 (Traefik Blue-Green, Synology)
# ===================================================================
#
# deploy 브랜치 푸시 시 Docker 이미지를 빌드하고
# Traefik 라벨 기반 Blue-Green 토글로 Synology NAS 에 무중단 배포합니다.
#
# 본 워크플로우는 무중단 배포 옵션입니다.
# 기본 배포는 PROJECT-SPRING-SYNOLOGY-SIMPLE-CICD.yaml 입니다.
# 전환하려면 아래 push.branches 주석 해제 + SIMPLE-CICD 의 push 트리거 주석 처리.
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# APPLICATION_PROD_YML (선택): application-prod.yml 내용
# DOCKERHUB_USERNAME: DockerHub 사용자명
# DOCKERHUB_TOKEN: DockerHub 액세스 토큰
# SERVER_HOST: 배포 서버 주소
# SERVER_USER: SSH 사용자명
# SERVER_PASSWORD: SSH 비밀번호
# ===================================================================
#
# 🔧 환경변수 설정 (env 섹션에서 설정)
# ===================================================================
#
# 🌐 포트 및 컨테이너:
# PROJECT_NAME: 프로젝트명 (컨테이너/이미지/Traefik router 이름)
# PRODUCTION_DOMAIN: 외부 진입 도메인
# CONTAINER_INTERNAL_PORT: Spring Boot 내부 포트 (기본: 8080)
#
# 🚦 Traefik:
# TRAEFIK_NETWORK: Traefik docker 네트워크 (기본: traefik-network)
# TRAEFIK_ENTRYPOINT: Traefik entrypoint 이름 (기본: web)
# TRAEFIK_INTERNAL_PORT: NAS 호스트의 Traefik 진입 포트 (기본: 8079)
# EXTRA_NETWORKS: 추가 docker 네트워크 (공백 구분, 예: selenium-chrome-network)
#
# 📦 볼륨/스토리지:
# ENABLE_VOLUME_MOUNT: 볼륨 마운트 여부 (true/false)
# VOLUME_HOST_PATH: 호스트 볼륨 경로
# VOLUME_CONTAINER_PATH: 컨테이너 내부 마운트 경로
#
# 🔌 SSH 연결:
# SSH_PORT: SSH 포트 (기본: 2022)
# SSH_COMMAND_TIMEOUT: 명령 타임아웃 (기본: 600s)
# SSH_CONNECTION_TIMEOUT: 연결 타임아웃 (기본: 60s)
#
# ⏱️ 헬스체크:
# HEALTHCHECK_PATH: Traefik 통한 GET 호출 path (기본: /)
# HEALTHCHECK_ACCEPT_CODES: 통과 인정 HTTP 코드 (| 구분, 기본: 200|301|302|308)
# HEALTHCHECK_MAX_RETRIES: 최대 시도 횟수 (기본: 36)
# HEALTHCHECK_RETRY_INTERVAL: 재시도 간격 초 (기본: 5)
# IN_FLIGHT_WAIT: old 컨테이너 제거 전 대기 초 (기본: 10)
#
# 💡 사전 조건:
#   - Synology 에 Traefik 컨테이너가 traefik-network 에 띄워져 있어야 함
#   - DSM 역방향 프록시: ${PRODUCTION_DOMAIN}:443 → localhost:${TRAEFIK_INTERNAL_PORT}
# ===================================================================

name: PROJECT-SPRING-SYNOLOGY-NONSTOP-TRAEFIK-CICD

# ===================================================================
# 트리거 설정
# ===================================================================
# deploy 브랜치 push 자동 트리거는 주석 처리되어 있습니다.
# 본 워크플로우로 전환하려면 아래 push.branches 주석을 해제하세요.
on:
  # push:
  #   branches:
  #     - deploy
  workflow_dispatch:

# ===================================================================
# 환경 변수 설정
# ===================================================================
env:
  # 🔧 프로젝트 설정 - 실제 프로젝트명으로 변경하세요
  PROJECT_NAME: "mapsy-back"
  PRODUCTION_DOMAIN: "example.com"

  # ☁️ Spring Boot 설정
  SPRING_PROFILE: "prod"
  JAVA_VERSION: "21"
  GRADLE_OPTS: "-Dspring.profiles.active=prod"

  # 📁 경로 설정
  APPLICATION_YML_DIR: "MS-Web/src/main/resources"
  DOCKERFILE_PATH: "./Dockerfile"

  # 🌐 포트 및 컨테이너 설정
  CONTAINER_INTERNAL_PORT: "8080"

  # 🚦 Traefik 설정 (Synology Traefik 환경 구축 후 수정 금지)
  TRAEFIK_NETWORK: "traefik-network"
  TRAEFIK_ENTRYPOINT: "web"
  TRAEFIK_INTERNAL_PORT: "8079"
  EXTRA_NETWORKS: ""

  # 📦 볼륨 마운트 설정
  ENABLE_VOLUME_MOUNT: "false"
  VOLUME_HOST_PATH: "/volume1/projects/mapsy-back"
  VOLUME_CONTAINER_PATH: "/mnt/mapsy-back"

  # 🔌 SSH 연결 설정
  SSH_PORT: "2022"
  SSH_COMMAND_TIMEOUT: "600s"
  SSH_CONNECTION_TIMEOUT: "60s"

  # ⏱️ 헬스체크 설정
  HEALTHCHECK_PATH: "/"
  HEALTHCHECK_ACCEPT_CODES: "200|301|302|308"
  HEALTHCHECK_MAX_RETRIES: "36"
  HEALTHCHECK_RETRY_INTERVAL: "5"
  IN_FLIGHT_WAIT: "10"

jobs:
  # ===================================================================
  # 빌드 작업
  # ===================================================================
  build:
    name: Spring Boot 애플리케이션 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle Wrapper 실행권한 부여
        run: chmod +x gradlew

      - name: application-prod.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/application-prod.yml
          ${{ secrets.APPLICATION_PROD_YML }}
          EOF
          echo "✅ application-prod.yml 파일 생성 완료 (${{ env.APPLICATION_YML_DIR }})"

      - name: Build with Gradle
        run: ./gradlew clean build -x test ${{ env.GRADLE_OPTS }}

      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ===================================================================
  # 배포 작업 (Blue-Green 무중단)
  # ===================================================================
  deploy:
    name: Blue-Green 무중단 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          PRODUCTION_DOMAIN: ${{ env.PRODUCTION_DOMAIN }}
          CONTAINER_INTERNAL_PORT: ${{ env.CONTAINER_INTERNAL_PORT }}
          SPRING_PROFILE: ${{ env.SPRING_PROFILE }}
          ENABLE_VOLUME_MOUNT: ${{ env.ENABLE_VOLUME_MOUNT }}
          VOLUME_HOST_PATH: ${{ env.VOLUME_HOST_PATH }}
          VOLUME_CONTAINER_PATH: ${{ env.VOLUME_CONTAINER_PATH }}
          EXTRA_NETWORKS: ${{ env.EXTRA_NETWORKS }}
          TRAEFIK_NETWORK: ${{ env.TRAEFIK_NETWORK }}
          TRAEFIK_ENTRYPOINT: ${{ env.TRAEFIK_ENTRYPOINT }}
          TRAEFIK_INTERNAL_PORT: ${{ env.TRAEFIK_INTERNAL_PORT }}
          HEALTHCHECK_PATH: ${{ env.HEALTHCHECK_PATH }}
          HEALTHCHECK_ACCEPT_CODES: ${{ env.HEALTHCHECK_ACCEPT_CODES }}
          HEALTHCHECK_MAX_RETRIES: ${{ env.HEALTHCHECK_MAX_RETRIES }}
          HEALTHCHECK_RETRY_INTERVAL: ${{ env.HEALTHCHECK_RETRY_INTERVAL }}
          IN_FLIGHT_WAIT: ${{ env.IN_FLIGHT_WAIT }}
          BRANCH_REF: ${{ github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          command_timeout: ${{ env.SSH_COMMAND_TIMEOUT }}
          timeout: ${{ env.SSH_CONNECTION_TIMEOUT }}
          envs: PROJECT_NAME,PRODUCTION_DOMAIN,CONTAINER_INTERNAL_PORT,SPRING_PROFILE,ENABLE_VOLUME_MOUNT,VOLUME_HOST_PATH,VOLUME_CONTAINER_PATH,EXTRA_NETWORKS,TRAEFIK_NETWORK,TRAEFIK_ENTRYPOINT,TRAEFIK_INTERNAL_PORT,HEALTHCHECK_PATH,HEALTHCHECK_ACCEPT_CODES,HEALTHCHECK_MAX_RETRIES,HEALTHCHECK_RETRY_INTERVAL,IN_FLIGHT_WAIT,BRANCH_REF,DOCKERHUB_USERNAME,SERVER_PASSWORD
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            export PW="${SERVER_PASSWORD}"

            IMAGE="${DOCKERHUB_USERNAME}/${PROJECT_NAME}:${BRANCH_REF}"
            ROUTER_NAME="${PROJECT_NAME}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Blue-Green 무중단 배포 시작"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 프로젝트: ${PROJECT_NAME}"
            echo "🌐 도메인: ${PRODUCTION_DOMAIN}"
            echo "🖼️ 이미지: ${IMAGE}"
            echo "🔧 Traefik 진입: localhost:${TRAEFIK_INTERNAL_PORT} (entrypoint=${TRAEFIK_ENTRYPOINT})"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ============================================================
            # 1. 최신 이미지 Pull
            # ============================================================
            echo "📥 이미지 Pull: ${IMAGE}"
            echo $PW | sudo -S docker pull "${IMAGE}"

            # ============================================================
            # 2. 현재 active 컨테이너 색 판별 (Traefik 라벨 부착 여부 기준)
            # ============================================================
            ACTIVE=$(echo $PW | sudo -S docker ps \
              --filter "label=traefik.http.routers.${ROUTER_NAME}.rule" \
              --filter "name=${PROJECT_NAME}-" \
              --format "{{.Names}}" | head -1 || echo "")

            if [ "$ACTIVE" = "${PROJECT_NAME}-blue" ]; then
              NEW_COLOR="green"
              OLD_COLOR="blue"
            elif [ "$ACTIVE" = "${PROJECT_NAME}-green" ]; then
              NEW_COLOR="blue"
              OLD_COLOR="green"
            else
              # 최초 배포 또는 active 없음 → blue 부터 시작
              NEW_COLOR="blue"
              OLD_COLOR="green"
            fi

            NEW_NAME="${PROJECT_NAME}-${NEW_COLOR}"
            OLD_NAME="${PROJECT_NAME}-${OLD_COLOR}"

            echo "🎨 active=${ACTIVE:-none} → new=${NEW_NAME}, old=${OLD_NAME}"

            # ============================================================
            # 3. 동일 슬롯(idle 쪽) 잔존 컨테이너 정리
            # ============================================================
            echo "🗑️ idle 슬롯 정리: ${NEW_NAME}"
            echo $PW | sudo -S docker rm -f "${NEW_NAME}" 2>/dev/null || true

            # ============================================================
            # 4. 볼륨 마운트 옵션 구성
            # ============================================================
            VOLUME_MOUNT_OPTION="-v /etc/localtime:/etc/localtime:ro"
            if [ "${ENABLE_VOLUME_MOUNT}" = "true" ]; then
              if [ ! -d "${VOLUME_HOST_PATH}" ]; then
                echo "📁 볼륨 마운트 디렉토리 생성: ${VOLUME_HOST_PATH}"
                echo $PW | sudo -S mkdir -p "${VOLUME_HOST_PATH}"
              fi
              VOLUME_MOUNT_OPTION="${VOLUME_MOUNT_OPTION} -v ${VOLUME_HOST_PATH}:${VOLUME_CONTAINER_PATH}"
              echo "📦 볼륨 마운트 활성화: ${VOLUME_HOST_PATH} → ${VOLUME_CONTAINER_PATH}"
            else
              echo "ℹ️ 볼륨 마운트 비활성화됨"
            fi

            # ============================================================
            # 5. 새 컨테이너 기동 (Traefik 라벨 포함)
            # ============================================================
            echo "🐳 새 컨테이너 기동: ${NEW_NAME}"
            echo $PW | sudo -S docker run -d \
              --name "${NEW_NAME}" \
              --network "${TRAEFIK_NETWORK}" \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.${ROUTER_NAME}.rule=Host(\`${PRODUCTION_DOMAIN}\`)" \
              --label "traefik.http.routers.${ROUTER_NAME}.entrypoints=${TRAEFIK_ENTRYPOINT}" \
              --label "traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=${CONTAINER_INTERNAL_PORT}" \
              -e TZ=Asia/Seoul \
              -e "SPRING_PROFILES_ACTIVE=${SPRING_PROFILE}" \
              ${VOLUME_MOUNT_OPTION} \
              "${IMAGE}"

            # ============================================================
            # 6. 추가 네트워크 연결 (EXTRA_NETWORKS, 공백 구분)
            # ============================================================
            if [ -n "${EXTRA_NETWORKS}" ]; then
              for net in ${EXTRA_NETWORKS}; do
                echo "🔗 추가 네트워크 연결: ${net}"
                echo $PW | sudo -S docker network connect "${net}" "${NEW_NAME}" 2>/dev/null || true
              done
            fi

            # ============================================================
            # 7. Traefik 라벨 디버그 출력 (escape 검증용)
            # ============================================================
            echo "🔍 Traefik 라벨 확인:"
            echo $PW | sudo -S docker inspect "${NEW_NAME}" --format '{{range $k, $v := .Config.Labels}}  {{$k}} = {{$v}}{{"\n"}}{{end}}' | grep traefik || true

            # ============================================================
            # 8. 헬스체크 — Traefik 통한 라우팅 확인
            # ============================================================
            MAX_WAIT=$((HEALTHCHECK_MAX_RETRIES * HEALTHCHECK_RETRY_INTERVAL))
            echo "⏳ 헬스체크 시작 (최대 ${MAX_WAIT}초, ${HEALTHCHECK_MAX_RETRIES}회 × ${HEALTHCHECK_RETRY_INTERVAL}초)"

            RETRY_COUNT=0
            HEALTHCHECK_SUCCESS=false

            while [ $RETRY_COUNT -lt $HEALTHCHECK_MAX_RETRIES ]; do
              sleep ${HEALTHCHECK_RETRY_INTERVAL}
              RETRY_COUNT=$((RETRY_COUNT + 1))

              STATUS=$(echo $PW | sudo -S docker inspect --format='{{.State.Status}}' "${NEW_NAME}" 2>/dev/null || echo "not_found")

              if [ "$STATUS" = "exited" ]; then
                echo "❌ 컨테이너 비정상 종료 (exited). 로그 200줄:"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo $PW | sudo -S docker logs --tail 200 "${NEW_NAME}"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "ℹ️ 컨테이너 ${NEW_NAME} 유지 (자동 삭제 안 함) — 수동 검증/디버깅"
                echo "ℹ️ old=${OLD_NAME} 존재 시 그대로 유지 → 사실상 자동 롤백"
                exit 1
              fi

              if [ "$STATUS" = "running" ]; then
                HTTP_CODE=$(curl -sm 5 -o /dev/null -w "%{http_code}" \
                  -H "Host: ${PRODUCTION_DOMAIN}" \
                  "http://localhost:${TRAEFIK_INTERNAL_PORT}${HEALTHCHECK_PATH}" 2>/dev/null || echo "000")

                if echo "$HTTP_CODE" | grep -Eq "^(${HEALTHCHECK_ACCEPT_CODES})$"; then
                  echo "✅ 헬스체크 통과 (${RETRY_COUNT}/${HEALTHCHECK_MAX_RETRIES}) HTTP=${HTTP_CODE}"
                  HEALTHCHECK_SUCCESS=true
                  break
                fi
              fi

              echo "⏳ 대기 (${RETRY_COUNT}/${HEALTHCHECK_MAX_RETRIES}) status=${STATUS} http=${HTTP_CODE:-?}"
            done

            if [ "$HEALTHCHECK_SUCCESS" = "false" ]; then
              echo "❌ 헬스체크 타임아웃 (${MAX_WAIT}초)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔍 ${NEW_NAME} 최근 200줄 로그:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo $PW | sudo -S docker logs --tail 200 "${NEW_NAME}"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "ℹ️ 컨테이너 ${NEW_NAME} 유지 (자동 삭제 안 함) — 수동 검증/디버깅"
              echo "ℹ️ old=${OLD_NAME} 존재 시 그대로 유지 → 사실상 자동 롤백"
              exit 1
            fi

            # ============================================================
            # 9. in-flight 처리 + old 컨테이너 자동 제거
            # ============================================================
            if echo $PW | sudo -S docker ps -a --format '{{.Names}}' | grep -Eq "^${OLD_NAME}$"; then
              echo "⏱️ in-flight 요청 처리 대기 (${IN_FLIGHT_WAIT}초)"
              sleep ${IN_FLIGHT_WAIT}
              echo "🗑️ old=${OLD_NAME} 제거"
              echo $PW | sudo -S docker rm -f "${OLD_NAME}"
            else
              echo "ℹ️ old=${OLD_NAME} 없음 — 정리 생략"
            fi

            # ============================================================
            # 10. dangling 이미지 정리
            # ============================================================
            echo "🧹 dangling(<none>) 이미지 정리..."
            echo $PW | sudo -S docker image prune -af

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ 무중단 배포 완료. active=${NEW_NAME}"
            echo "🌐 도메인: https://${PRODUCTION_DOMAIN}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ===================================================================
# 📝 사용 방법
# ===================================================================
#
# 1) GitHub Secrets 등록:
#    APPLICATION_PROD_YML, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN,
#    SERVER_HOST, SERVER_USER, SERVER_PASSWORD
#
# 2) 본 워크플로우의 env 블록에서 프로젝트별 설정 수정:
#    - PROJECT_NAME, PRODUCTION_DOMAIN
#    - APPLICATION_YML_DIR, CONTAINER_INTERNAL_PORT
#    - ENABLE_VOLUME_MOUNT, VOLUME_HOST_PATH, VOLUME_CONTAINER_PATH
#    - EXTRA_NETWORKS (예: selenium-chrome-network)
#    - HEALTHCHECK_PATH, HEALTHCHECK_ACCEPT_CODES
#
# 3) Synology 사전 준비:
#    - Traefik 컨테이너가 traefik-network 에 띄워져 있어야 함
#    - DSM 역방향 프록시: ${PRODUCTION_DOMAIN}:443 → localhost:${TRAEFIK_INTERNAL_PORT}
#
# 4) 본 워크플로우로 전환:
#    - 본 파일의 push.branches 주석 해제
#    - PROJECT-SPRING-SYNOLOGY-SIMPLE-CICD.yaml 의 push 트리거 주석 처리
#
# ===================================================================
