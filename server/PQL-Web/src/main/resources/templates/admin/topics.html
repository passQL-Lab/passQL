<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<th:block layout:fragment="title">토픽/태그 관리</th:block>

<th:block layout:fragment="content">

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">

        <!-- 토픽 목록 -->
        <div class="card bg-base-100 shadow">
            <div class="card-body p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="card-title text-base">
                        <i data-lucide="tags" class="size-5"></i>
                        토픽 목록
                    </h3>
                    <button class="btn btn-sm btn-success" onclick="document.getElementById('newTopicModal').showModal()">
                        <i data-lucide="plus" class="size-4"></i>
                        토픽 추가
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead>
                        <tr>
                            <th>코드</th>
                            <th>이름</th>
                            <th class="w-16">순서</th>
                            <th class="w-16">활성</th>
                            <th class="w-20">액션</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="topic : ${topics}"
                            th:classappend="${selectedTopicCode == topic.code} ? 'bg-primary/5'"
                            class="cursor-pointer hover"
                            th:data-code="${topic.code}"
                            onclick="window.location.href='/admin/topics?topicCode=' + this.dataset.code">
                            <td class="font-mono text-xs font-bold" th:text="${topic.code}">SELECT</td>
                            <td th:text="${topic.displayName}">SELECT 문</td>
                            <td class="text-center" th:text="${topic.sortOrder}">1</td>
                            <td>
                                <span th:classappend="${topic.isActive} ? 'badge-success' : 'badge-ghost'"
                                      class="badge badge-xs"
                                      th:text="${topic.isActive} ? '활성' : '비활성'">활성</span>
                            </td>
                            <td>
                                <button class="btn btn-xs btn-ghost"
                                        th:data-code="${topic.code}"
                                        th:data-name="${topic.displayName}"
                                        th:data-sort="${topic.sortOrder}"
                                        th:data-active="${topic.isActive}"
                                        onclick="editTopic(this.dataset.code, this.dataset.name, this.dataset.sort, this.dataset.active); event.stopPropagation()">
                                    <i data-lucide="pencil" class="size-3"></i>
                                </button>
                            </td>
                        </tr>

                        <!-- Placeholder -->
                        <th:block th:if="${topics == null or topics.isEmpty()}">
                            <tr class="bg-primary/5">
                                <td class="font-mono text-xs font-bold">SELECT</td>
                                <td>SELECT 문</td>
                                <td class="text-center">1</td>
                                <td><span class="badge badge-xs badge-success">활성</span></td>
                                <td><button class="btn btn-xs btn-ghost"><i data-lucide="pencil" class="size-3"></i></button></td>
                            </tr>
                            <tr>
                                <td class="font-mono text-xs font-bold">JOIN</td>
                                <td>JOIN</td>
                                <td class="text-center">2</td>
                                <td><span class="badge badge-xs badge-success">활성</span></td>
                                <td><button class="btn btn-xs btn-ghost"><i data-lucide="pencil" class="size-3"></i></button></td>
                            </tr>
                            <tr>
                                <td class="font-mono text-xs font-bold">GROUP_BY</td>
                                <td>GROUP BY</td>
                                <td class="text-center">3</td>
                                <td><span class="badge badge-xs badge-success">활성</span></td>
                                <td><button class="btn btn-xs btn-ghost"><i data-lucide="pencil" class="size-3"></i></button></td>
                            </tr>
                            <tr>
                                <td class="font-mono text-xs font-bold">SUBQUERY</td>
                                <td>서브쿼리</td>
                                <td class="text-center">4</td>
                                <td><span class="badge badge-xs badge-ghost">비활성</span></td>
                                <td><button class="btn btn-xs btn-ghost"><i data-lucide="pencil" class="size-3"></i></button></td>
                            </tr>
                        </th:block>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 서브토픽 목록 -->
        <div class="card bg-base-100 shadow">
            <div class="card-body p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="card-title text-base">
                        <i data-lucide="git-branch" class="size-5"></i>
                        서브토픽
                        <span class="badge badge-outline badge-sm" th:if="${selectedTopicCode}"
                              th:text="${selectedTopicCode}">SELECT</span>
                        <span class="text-base-content/40 text-sm font-normal" th:unless="${selectedTopicCode}">토픽을 선택하세요</span>
                    </h3>
                    <button class="btn btn-sm btn-success" th:if="${selectedTopicCode}"
                            onclick="document.getElementById('newSubtopicModal').showModal()">
                        <i data-lucide="plus" class="size-4"></i>
                        서브토픽 추가
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead>
                        <tr>
                            <th>코드</th>
                            <th>이름</th>
                            <th class="w-16">순서</th>
                            <th class="w-16">활성</th>
                            <th class="w-20">액션</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="sub : ${subtopics}" th:if="${subtopics != null and !subtopics.isEmpty()}">
                            <td class="font-mono text-xs font-bold" th:text="${sub.code}">basic_select</td>
                            <td th:text="${sub.displayName}">기본 SELECT</td>
                            <td class="text-center" th:text="${sub.sortOrder}">1</td>
                            <td>
                                <span th:classappend="${sub.isActive} ? 'badge-success' : 'badge-ghost'"
                                      class="badge badge-xs"
                                      th:text="${sub.isActive} ? '활성' : '비활성'">활성</span>
                            </td>
                            <td>
                                <button class="btn btn-xs btn-ghost">
                                    <i data-lucide="pencil" class="size-3"></i>
                                </button>
                            </td>
                        </tr>

                        <!-- Empty/placeholder state -->
                        <tr th:if="${subtopics == null or subtopics.isEmpty()}">
                            <td colspan="5" class="text-center text-base-content/40 py-8">
                                <i data-lucide="git-branch" class="size-8 mx-auto mb-2 opacity-30"></i>
                                <p class="text-sm" th:text="${selectedTopicCode != null} ? '서브토픽이 없습니다.' : '좌측에서 토픽을 선택하세요.'">
                                    좌측에서 토픽을 선택하세요.
                                </p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 토픽 추가 모달 -->
    <dialog id="newTopicModal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-4">토픽 추가</h3>
            <form th:action="@{/admin/topics}" method="post" class="space-y-3">
                <div class="form-control">
                    <label class="label"><span class="label-text">코드 (영문 대문자)</span></label>
                    <input type="text" name="code" class="input input-bordered" placeholder="SELECT" required pattern="[A-Z_]+"/>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">이름</span></label>
                    <input type="text" name="displayName" class="input input-bordered" placeholder="SELECT 문" required/>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">정렬 순서</span></label>
                    <input type="number" name="sortOrder" class="input input-bordered" value="1" min="1"/>
                </div>
                <div class="modal-action">
                    <button type="button" class="btn btn-ghost" onclick="document.getElementById('newTopicModal').close()">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <!-- 서브토픽 추가 모달 -->
    <dialog id="newSubtopicModal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-4">서브토픽 추가</h3>
            <form th:action="@{/admin/topics/subtopics}" method="post" class="space-y-3">
                <input type="hidden" name="topicCode" th:value="${selectedTopicCode}"/>
                <div class="form-control">
                    <label class="label"><span class="label-text">코드</span></label>
                    <input type="text" name="code" class="input input-bordered" placeholder="basic_select" required/>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">이름</span></label>
                    <input type="text" name="displayName" class="input input-bordered" placeholder="기본 SELECT" required/>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">정렬 순서</span></label>
                    <input type="number" name="sortOrder" class="input input-bordered" value="1" min="1"/>
                </div>
                <div class="modal-action">
                    <button type="button" class="btn btn-ghost" onclick="document.getElementById('newSubtopicModal').close()">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

</th:block>

<th:block layout:fragment="js">
    <script>
        lucide.createIcons();

        function editTopic(code, displayName, sortOrder, isActive) {
            // TODO: 편집 모달 오픈
            alert('편집: ' + code);
        }
    </script>
</th:block>
</html>
