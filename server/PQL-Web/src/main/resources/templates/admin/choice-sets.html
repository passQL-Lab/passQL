<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<div th:fragment="content">
    <h2>선택지 세트 이력</h2>

    <table border="1">
        <thead>
            <tr>
                <th>UUID</th>
                <th>문제</th>
                <th>출처</th>
                <th>상태</th>
                <th>재시도</th>
                <th>모델</th>
                <th>생성시각</th>
                <th>상세</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="set : ${choiceSets.content}">
                <td th:text="${#strings.abbreviate(set.choiceSetUuid.toString(), 12)}">uuid</td>
                <td th:text="${#strings.abbreviate(set.questionUuid.toString(), 12)}">q-uuid</td>
                <td th:text="${set.source}">AI_RUNTIME</td>
                <td th:text="${set.status}">OK</td>
                <td th:text="${set.generationAttempts}">1</td>
                <td th:text="${set.modelName}">gemini</td>
                <td th:text="${set.createdAt}">2026-04-09</td>
                <td><a th:href="@{/admin/choice-sets/{uuid}(uuid=${set.choiceSetUuid})}">상세</a></td>
            </tr>
        </tbody>
    </table>
</div>
</html>
