<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<div th:fragment="content">
    <h2>프롬프트 테스트</h2>

    <div style="display:flex; gap:24px;">
        <!-- 좌측: 프롬프트 정보 -->
        <div style="flex:1;">
            <h3 th:text="${prompt.keyName}">key</h3>
            <p>버전: <span th:text="${prompt.version}">1</span></p>
            <p>모델: <span th:text="${prompt.model}">gemini</span></p>

            <h4>System Prompt</h4>
            <pre style="white-space:pre-wrap; background:#f5f5f5; padding:8px;"
                 th:text="${prompt.systemPrompt}">-</pre>

            <h4>User Template</h4>
            <pre style="white-space:pre-wrap; background:#f5f5f5; padding:8px;"
                 th:text="${prompt.userTemplate}">-</pre>
        </div>

        <!-- 우측: 테스트 패널 -->
        <div style="flex:1;">
            <h3>테스트 실행</h3>
            <div id="variableInputs">
                <!-- JS가 user_template 에서 {변수} 파싱해서 자동 생성 -->
            </div>
            <button onclick="runTest()">테스트 실행</button>

            <div id="resultArea" style="display:none; margin-top:16px;">
                <h4>결과</h4>
                <pre id="resultText" style="white-space:pre-wrap; background:#f5f5f5; padding:8px;"></pre>
                <p>응답시간: <span id="elapsedMs">-</span>ms</p>
            </div>

            <div style="margin-top:16px;">
                <button onclick="activateVersion()">이 버전 활성화</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const promptUuid = [[${prompt.promptTemplateUuid}]];
        const userTemplate = [[${prompt.userTemplate}]];

        // {변수명} 파싱해서 입력 필드 생성
        const varPattern = /\{(\w+)\}/g;
        const variables = new Set();
        let match;
        while ((match = varPattern.exec(userTemplate)) !== null) {
            variables.add(match[1]);
        }
        const container = document.getElementById('variableInputs');
        variables.forEach(v => {
            container.innerHTML += `
                <div style="margin:4px 0;">
                    <label><strong>{${v}}</strong></label><br/>
                    <textarea id="var_${v}" rows="2" style="width:100%"></textarea>
                </div>
            `;
        });

        async function runTest() {
            const vars = {};
            variables.forEach(v => {
                vars[v] = document.getElementById('var_' + v).value;
            });
            try {
                const resp = await fetch('/admin/prompts/' + promptUuid + '/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(vars)
                });
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                document.getElementById('resultText').textContent = data.result;
                document.getElementById('elapsedMs').textContent = data.elapsedMs;
                document.getElementById('resultArea').style.display = 'block';
            } catch (e) {
                alert('테스트 실패: ' + e.message);
            }
        }

        async function activateVersion() {
            await fetch('/admin/prompts/' + promptUuid + '/activate', {method:'PUT'});
            alert('활성화 완료');
            location.reload();
        }
    </script>
</div>
</html>
