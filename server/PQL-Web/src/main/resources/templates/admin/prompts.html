<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<th:block layout:fragment="title">프롬프트 관리</th:block>

<th:block layout:fragment="content">

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">

        <!-- 프롬프트 목록 -->
        <div class="card bg-base-100 shadow xl:col-span-1">
            <div class="card-body p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="card-title text-base">
                        <i data-lucide="message-square-code" class="size-5"></i>
                        프롬프트 목록
                    </h3>
                </div>

                <div class="space-y-2">
                    <a th:each="pt : ${promptTemplates}"
                       th:href="@{/admin/prompts/{id}(id=${pt.id})}"
                       th:classappend="${selectedPrompt?.id == pt.id} ? 'bg-primary/10 border-primary' : 'border-base-300'"
                       class="block border rounded-lg p-3 cursor-pointer hover:bg-base-200 transition-colors">
                        <div class="flex items-start justify-between gap-2">
                            <div class="min-w-0">
                                <p class="font-medium text-sm truncate" th:text="${pt.keyName}">explain_error</p>
                                <p class="text-xs text-base-content/60 mt-0.5" th:text="'v' + ${pt.version} + ' · ' + ${pt.model}">v3 · llama3.1</p>
                            </div>
                            <span th:classappend="${pt.isActive} ? 'badge-success' : 'badge-ghost'"
                                  class="badge badge-sm shrink-0"
                                  th:text="${pt.isActive} ? '활성' : '비활성'">활성</span>
                        </div>
                    </a>

                    <!-- Placeholder -->
                    <th:block th:if="${promptTemplates == null or promptTemplates.isEmpty()}">
                        <div class="border border-primary/30 bg-primary/5 rounded-lg p-3">
                            <div class="flex items-start justify-between gap-2">
                                <div>
                                    <p class="font-medium text-sm">explain_error</p>
                                    <p class="text-xs text-base-content/60 mt-0.5">v3 · llama3.1:8b</p>
                                </div>
                                <span class="badge badge-sm badge-success">활성</span>
                            </div>
                        </div>
                        <div class="border border-base-300 rounded-lg p-3">
                            <div class="flex items-start justify-between gap-2">
                                <div>
                                    <p class="font-medium text-sm">diff_explain</p>
                                    <p class="text-xs text-base-content/60 mt-0.5">v2 · llama3.1:8b</p>
                                </div>
                                <span class="badge badge-sm badge-success">활성</span>
                            </div>
                        </div>
                        <div class="border border-base-300 rounded-lg p-3">
                            <div class="flex items-start justify-between gap-2">
                                <div>
                                    <p class="font-medium text-sm">similar</p>
                                    <p class="text-xs text-base-content/60 mt-0.5">v1 · nomic-embed-text</p>
                                </div>
                                <span class="badge badge-sm badge-ghost">비활성</span>
                            </div>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>

        <!-- 프롬프트 편집 폼 -->
        <div class="card bg-base-100 shadow xl:col-span-2">
            <div class="card-body">
                <h3 class="card-title text-base mb-4">
                    <i data-lucide="edit" class="size-5"></i>
                    프롬프트 편집
                </h3>

                <form th:action="${selectedPrompt?.id != null} ? @{/admin/prompts/{id}(id=${selectedPrompt.id})} : @{/admin/prompts}"
                      th:method="${selectedPrompt?.id != null} ? 'put' : 'post'"
                      class="space-y-4">

                    <div class="grid grid-cols-2 gap-4">
                        <!-- keyName -->
                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">Key Name <span class="text-error">*</span></span></label>
                            <select name="keyName" class="select select-bordered">
                                <option value="explain_error" th:selected="${selectedPrompt?.keyName == 'explain_error'}">explain_error</option>
                                <option value="diff_explain" th:selected="${selectedPrompt?.keyName == 'diff_explain'}">diff_explain</option>
                                <option value="similar" th:selected="${selectedPrompt?.keyName == 'similar'}">similar</option>
                            </select>
                        </div>

                        <!-- version -->
                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">버전</span></label>
                            <input type="number" name="version" min="1" class="input input-bordered"
                                   th:value="${selectedPrompt?.version ?: 1}" placeholder="1"/>
                        </div>

                        <!-- model -->
                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">모델</span></label>
                            <input type="text" name="model" class="input input-bordered"
                                   th:value="${selectedPrompt?.model}" placeholder="llama3.1:8b"/>
                        </div>

                        <!-- isActive -->
                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">활성화</span></label>
                            <div class="flex items-center h-12">
                                <input type="checkbox" name="isActive" class="toggle toggle-success"
                                       th:checked="${selectedPrompt?.isActive ?: true}"/>
                                <span class="ml-2 text-sm text-base-content/70">활성 프롬프트로 사용</span>
                            </div>
                        </div>

                        <!-- temperature -->
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-medium">Temperature</span>
                                <span class="label-text-alt" id="tempValue"
                                      th:text="${selectedPrompt?.temperature ?: 0.7}">0.7</span>
                            </label>
                            <input type="range" name="temperature" min="0" max="1" step="0.05"
                                   th:value="${selectedPrompt?.temperature ?: 0.7}"
                                   class="range range-sm range-primary"
                                   oninput="document.getElementById('tempValue').textContent=this.value"/>
                        </div>

                        <!-- maxTokens -->
                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">Max Tokens</span></label>
                            <input type="number" name="maxTokens" min="100" max="8192" class="input input-bordered"
                                   th:value="${selectedPrompt?.maxTokens ?: 2048}" placeholder="2048"/>
                        </div>
                    </div>

                    <!-- systemPrompt -->
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">System Prompt</span></label>
                        <textarea name="systemPrompt" rows="8"
                                  class="textarea textarea-bordered w-full font-mono text-sm"
                                  placeholder="You are a SQL expert assistant..."
                                  th:text="${selectedPrompt?.systemPrompt}"></textarea>
                    </div>

                    <!-- userTemplate -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">User Template</span>
                            <span class="label-text-alt text-base-content/50">변수: {sql}, {error}, {question}</span>
                        </label>
                        <textarea name="userTemplate" rows="6"
                                  class="textarea textarea-bordered w-full font-mono text-sm"
                                  placeholder="다음 SQL 문의 오류를 분석해주세요:\n\nSQL: {sql}\n에러: {error}"
                                  th:text="${selectedPrompt?.userTemplate}"></textarea>
                    </div>

                    <div class="flex justify-end gap-2">
                        <a th:href="@{/admin/prompts}" class="btn btn-ghost">취소</a>
                        <button type="submit" class="btn btn-primary">
                            <i data-lucide="save" class="size-4"></i>
                            저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</th:block>

<th:block layout:fragment="js">
    <script>lucide.createIcons();</script>
</th:block>
</html>
