<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<div th:fragment="content">
    <h2>문제 등록 (AI 생성)</h2>

    <!-- Step 1: 기본 설정 -->
    <div id="step1">
        <h3>Step 1: 기본 설정</h3>
        <form id="generateForm">
            <div>
                <label>토픽</label>
                <select id="topic" required>
                    <option value="">선택</option>
                    <option th:each="t : ${topics}" th:value="${t.displayName}" th:text="${t.displayName}">-</option>
                </select>
            </div>
            <div>
                <label>난이도 (1-5)</label>
                <input type="number" id="difficulty" min="1" max="5" value="3" required />
            </div>
            <div>
                <label>DDL (CREATE TABLE)</label>
                <textarea id="schemaDdl" rows="8" required></textarea>
            </div>
            <div>
                <label>샘플 데이터 (INSERT)</label>
                <textarea id="schemaSampleData" rows="5"></textarea>
            </div>
            <div>
                <label>스키마 의도</label>
                <input type="text" id="schemaIntent" placeholder="예: 주문-고객 1:N 관계" />
            </div>
            <div>
                <label>힌트 키워드</label>
                <input type="text" id="hint" placeholder="예: OUTER JOIN 함정" />
            </div>
            <button type="button" onclick="generateQuestion()">AI 생성</button>
        </form>
    </div>

    <!-- Step 2: AI 생성 중 -->
    <div id="step2" style="display:none;">
        <h3>AI가 문제를 만들고 있어요...</h3>
        <p>잠시만 기다려주세요.</p>
    </div>

    <!-- Step 3: 검토 & 저장 -->
    <div id="step3" style="display:none;">
        <h3>Step 3: 검토 & 저장</h3>
        <form id="saveForm" action="/admin/questions" method="post">
            <input type="hidden" name="topicUuid" id="topicUuidHidden" />
            <input type="hidden" name="difficulty" id="difficultyHidden" />
            <input type="hidden" name="schemaDdl" id="schemaDdlHidden" />
            <input type="hidden" name="schemaSampleData" id="schemaSampleDataHidden" />
            <input type="hidden" name="schemaIntent" id="schemaIntentHidden" />
            <input type="hidden" name="choiceSetPolicy" value="AI_ONLY" />

            <div>
                <label>문제 (stem)</label>
                <textarea name="stem" id="stemField" rows="4" required></textarea>
            </div>
            <div>
                <label>정답 SQL</label>
                <textarea name="answerSql" id="answerSqlField" rows="3" required></textarea>
            </div>
            <div>
                <label>힌트</label>
                <input type="text" name="hint" id="hintField" />
            </div>

            <h4>선택지 (A~D)</h4>
            <div id="choicesContainer">
                <!-- JS가 동적으로 채움 -->
            </div>

            <button type="button" onclick="regenerate()">재생성</button>
            <button type="submit">저장</button>
        </form>
    </div>

    <script>
        async function generateQuestion() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';

            const body = {
                schema_ddl: document.getElementById('schemaDdl').value,
                schema_sample_data: document.getElementById('schemaSampleData').value,
                schema_intent: document.getElementById('schemaIntent').value,
                topic: document.getElementById('topic').value,
                difficulty: parseInt(document.getElementById('difficulty').value),
                hint: document.getElementById('hint').value
            };

            try {
                const resp = await fetch('/admin/questions/generate-full', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                populateStep3(data);
            } catch (e) {
                alert('AI 생성 실패: ' + e.message);
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step1').style.display = 'block';
            }
        }

        function populateStep3(data) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';

            document.getElementById('stemField').value = data.stem || '';
            document.getElementById('answerSqlField').value = data.answerSql || '';
            document.getElementById('difficultyHidden').value = document.getElementById('difficulty').value;
            document.getElementById('schemaDdlHidden').value = document.getElementById('schemaDdl').value;
            document.getElementById('schemaSampleDataHidden').value = document.getElementById('schemaSampleData').value;
            document.getElementById('schemaIntentHidden').value = document.getElementById('schemaIntent').value;
            document.getElementById('hintField').value = document.getElementById('hint').value;

            const container = document.getElementById('choicesContainer');
            container.innerHTML = '';
            (data.seedChoices || []).forEach((c, i) => {
                container.innerHTML += `
                    <div style="border:1px solid #ccc; padding:8px; margin:4px 0;">
                        <strong>${c.key}</strong>
                        ${c.isCorrect ? '<span style="color:green;">(정답)</span>' : ''}
                        <input type="hidden" name="choiceKeys" value="${c.key}" />
                        <textarea name="choiceBodies" rows="2" style="width:100%">${c.body}</textarea>
                        <input type="hidden" name="choiceCorrects" value="${c.isCorrect}" />
                        <textarea name="choiceRationales" rows="2" style="width:100%" placeholder="해설">${c.rationale}</textarea>
                    </div>
                `;
            });
        }

        function regenerate() {
            document.getElementById('step3').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }
    </script>
</div>
</html>
