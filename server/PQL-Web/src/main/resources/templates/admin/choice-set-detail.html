<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<div th:fragment="content">
    <h2>선택지 세트 상세</h2>

    <table border="1">
        <tr><th>UUID</th><td th:text="${choiceSet.choiceSetUuid}">-</td></tr>
        <tr><th>문제</th><td th:text="${choiceSet.questionUuid}">-</td></tr>
        <tr><th>출처</th><td th:text="${choiceSet.source}">-</td></tr>
        <tr><th>상태</th><td th:text="${choiceSet.status}">-</td></tr>
        <tr><th>대상 회원</th><td th:text="${choiceSet.generatedForMemberUuid}">-</td></tr>
        <tr><th>모델</th><td th:text="${choiceSet.modelName}">-</td></tr>
        <tr><th>temperature</th><td th:text="${choiceSet.temperature}">-</td></tr>
        <tr><th>재시도</th><td th:text="${choiceSet.generationAttempts}">-</td></tr>
        <tr><th>샌드박스 검증</th><td th:text="${choiceSet.sandboxValidationPassed}">-</td></tr>
        <tr><th>재사용</th><td th:text="${choiceSet.isReusable}">-</td></tr>
        <tr><th>소요(ms)</th><td th:text="${choiceSet.totalElapsedMs}">-</td></tr>
        <tr><th>생성시각</th><td th:text="${choiceSet.createdAt}">-</td></tr>
    </table>

    <h3>선택지</h3>
    <div th:each="item : ${items}" style="border:1px solid #ccc; padding:8px; margin:4px 0;">
        <strong th:text="${item.choiceKey}">A</strong>
        <span th:if="${item.isCorrect}" style="color:green;font-weight:bold;">(정답)</span>
        <pre th:text="${item.body}">SQL</pre>
        <p><strong>해설:</strong> <span th:text="${item.rationale}">-</span></p>
    </div>

    <div style="margin-top:16px;">
        <button onclick="disableSet()">비활성화</button>
        <button onclick="promoteSet()">재사용 풀 승격</button>
    </div>

    <script th:inline="javascript">
        const uuid = [[${choiceSet.choiceSetUuid}]];
        async function disableSet() {
            await fetch('/admin/choice-sets/' + uuid + '/disable', {method:'PUT'});
            location.reload();
        }
        async function promoteSet() {
            await fetch('/admin/choice-sets/' + uuid + '/promote', {method:'PUT'});
            location.reload();
        }
    </script>
</div>
</html>
