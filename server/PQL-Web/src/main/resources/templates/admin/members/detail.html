<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<th:block layout:fragment="title">회원 상세</th:block>

<th:block layout:fragment="css">
    <style>
        .info-row { display: flex; flex-direction: column; gap: 2px; }
        .info-label { font-size: 0.72rem; color: oklch(var(--bc)/0.5); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { font-size: 0.875rem; font-weight: 500; }
    </style>
</th:block>

<th:block layout:fragment="content">

    <!-- 뒤로가기 -->
    <div class="mb-5">
        <a th:href="@{/admin/members}" class="btn btn-sm btn-ghost gap-1">
            <i data-lucide="arrow-left" class="size-4"></i>목록으로
        </a>
    </div>

    <!-- 2-column layout -->
    <div class="flex flex-col xl:flex-row gap-6 items-start">

        <!-- ===== 왼쪽: 프로필 고정 패널 ===== -->
        <div class="w-full xl:w-80 shrink-0 flex flex-col gap-4">

            <!-- 프로필 카드 -->
            <div class="card bg-base-100 shadow">
                <div class="card-body items-center text-center gap-3 py-8">
                    <!-- 아바타 -->
                    <div class="avatar placeholder">
                        <div class="bg-primary text-primary-content rounded-full size-20 text-2xl font-bold">
                            <span th:text="${#strings.substring(member.nickname, 0, 1)}">N</span>
                        </div>
                    </div>

                    <!-- 닉네임 -->
                    <div>
                        <h2 class="text-xl font-bold" th:text="${member.nickname}">닉네임</h2>
                        <p class="text-xs font-mono text-base-content/40 mt-1 break-all" th:text="${member.memberUuid}">uuid</p>
                    </div>

                    <!-- 상태 / 역할 배지 -->
                    <div class="flex flex-wrap gap-2 justify-center">
                        <span class="badge badge-md font-semibold"
                              th:classappend="${member.status.name() == 'ACTIVE'} ? 'badge-success' : (${member.status.name() == 'SUSPENDED'} ? 'badge-error' : (${member.status.name() == 'WITHDRAWN'} ? 'badge-ghost' : 'badge-warning'))"
                              th:text="${member.status.name()}">ACTIVE</span>
                        <span class="badge badge-md badge-outline font-semibold"
                              th:classappend="${member.role.name() == 'ADMIN' or member.role.name() == 'SUPER_ADMIN'} ? 'badge-primary'"
                              th:text="${member.role.name()}">USER</span>
                        <span th:if="${member.isTestAccount}" class="badge badge-md badge-warning">TEST</span>
                    </div>
                </div>
            </div>

            <!-- 기본 정보 카드 -->
            <div class="card bg-base-100 shadow">
                <div class="card-body gap-4">
                    <h3 class="font-bold text-sm text-base-content/70 uppercase tracking-wider">기본 정보</h3>
                    <div class="grid grid-cols-1 gap-3">
                        <div class="info-row">
                            <span class="info-label">이메일</span>
                            <span class="info-value" th:text="${member.email != null ? member.email : '—'}">—</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">이메일 인증</span>
                            <span class="info-value">
                                <span th:if="${member.emailVerified}" class="badge badge-xs badge-success">인증됨</span>
                                <span th:if="${!member.emailVerified}" class="badge badge-xs badge-ghost">미인증</span>
                            </span>
                        </div>
                        <div class="divider my-0"></div>
                        <div class="info-row">
                            <span class="info-label">인증 방식</span>
                            <span class="info-value" th:text="${member.authProvider.name()}">ANONYMOUS</span>
                        </div>
                        <div class="info-row" th:if="${member.providerUserId != null}">
                            <span class="info-label">Provider ID</span>
                            <span class="info-value font-mono text-xs break-all" th:text="${member.providerUserId}">—</span>
                        </div>
                        <div class="divider my-0"></div>
                        <div class="info-row">
                            <span class="info-label">가입일</span>
                            <span class="info-value" th:text="${member.createdAt != null ? #temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm') : '—'}">—</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">마지막 접속</span>
                            <span class="info-value" th:text="${member.lastSeenAt != null ? #temporals.format(member.lastSeenAt, 'yyyy-MM-dd HH:mm') : '—'}">—</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">마지막 IP</span>
                            <span class="info-value font-mono text-xs" th:text="${member.lastLoginIp != null ? member.lastLoginIp : '—'}">—</span>
                        </div>
                        <div class="info-row" th:if="${member.withdrawnAt != null}">
                            <span class="info-label">탈퇴일</span>
                            <span class="info-value text-base-content/60" th:text="${#temporals.format(member.withdrawnAt, 'yyyy-MM-dd HH:mm')}">—</span>
                        </div>
                        <div class="info-row" th:if="${member.suspendUntil != null}">
                            <span class="info-label">제재 만료</span>
                            <span class="info-value text-error font-semibold" th:text="${#temporals.format(member.suspendUntil, 'yyyy-MM-dd HH:mm')}">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 제재 관리 카드 -->
            <div class="card bg-base-100 shadow" th:if="${member.status.name() != 'WITHDRAWN'}">
                <div class="card-body gap-3">
                    <h3 class="font-bold text-sm text-base-content/70 uppercase tracking-wider">제재 관리</h3>
                    <button th:if="${member.status.name() == 'SUSPENDED'}"
                            class="btn btn-success btn-sm w-full gap-2"
                            onclick="unsuspendMember()">
                        <i data-lucide="shield-check" class="size-4"></i>제재 해제
                    </button>
                    <button th:if="${member.status.name() != 'SUSPENDED'}"
                            class="btn btn-error btn-sm w-full gap-2"
                            onclick="document.getElementById('suspendModal').showModal()">
                        <i data-lucide="shield-ban" class="size-4"></i>제재 적용
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== 오른쪽: 탭 메인 영역 ===== -->
        <div class="flex-1 min-w-0 flex flex-col gap-4">

            <!-- 제출 통계 요약 -->
            <div class="stats shadow w-full bg-base-100" th:if="${submissions != null}">
                <div class="stat">
                    <div class="stat-figure text-primary">
                        <i data-lucide="send" class="size-8"></i>
                    </div>
                    <div class="stat-title">총 제출</div>
                    <div class="stat-value text-2xl" th:text="${submissions.size()}">0</div>
                </div>
                <div class="stat">
                    <div class="stat-figure text-success">
                        <i data-lucide="check-circle-2" class="size-8"></i>
                    </div>
                    <div class="stat-title">정답</div>
                    <div class="stat-value text-2xl text-success"
                         th:text="${#lists.size(submissions.?[isCorrect == true])}">0</div>
                </div>
                <div class="stat">
                    <div class="stat-figure text-info">
                        <i data-lucide="percent" class="size-8"></i>
                    </div>
                    <div class="stat-title">정답률</div>
                    <div class="stat-value text-2xl text-info"
                         th:text="${submissions.size() > 0 ? (#numbers.formatDecimal(#lists.size(submissions.?[isCorrect == true]) * 100.0 / submissions.size(), 1, 1) + '%') : '—'}">—</div>
                </div>
                <div class="stat">
                    <div class="stat-figure text-warning">
                        <i data-lucide="shield-alert" class="size-8"></i>
                    </div>
                    <div class="stat-title">제재 횟수</div>
                    <div class="stat-value text-2xl text-warning"
                         th:text="${#lists.size(member.suspendHistories.?[action.name() == 'SUSPENDED'])}">0</div>
                </div>
            </div>

            <!-- 탭 -->
            <div class="card bg-base-100 shadow">
                <div class="card-body p-0">
                    <!-- 탭 헤더 -->
                    <div role="tablist" class="tabs tabs-bordered px-4 pt-2">
                        <button role="tab" class="tab tab-active" id="tab-submission" onclick="switchTab('submission')">
                            <i data-lucide="list-checks" class="size-4 mr-1"></i>제출 이력
                            <span class="badge badge-sm ml-1" th:text="${submissions != null ? submissions.size() : 0}">0</span>
                        </button>
                        <button role="tab" class="tab" id="tab-suspend" onclick="switchTab('suspend')">
                            <i data-lucide="shield" class="size-4 mr-1"></i>제재 이력
                            <span class="badge badge-sm ml-1" th:text="${member.suspendHistories.size()}">0</span>
                        </button>
                    </div>

                    <!-- 제출 이력 패널 -->
                    <div id="panel-submission" class="p-4">
                        <div class="overflow-x-auto">
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th>문제 UUID</th>
                                    <th class="w-20">결과</th>
                                    <th class="w-40">제출일</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="s : ${submissions}">
                                    <td class="font-mono text-xs text-base-content/60" th:text="${s.questionUuid}">uuid</td>
                                    <td>
                                        <span class="badge badge-sm font-semibold"
                                              th:classappend="${s.isCorrect} ? 'badge-success' : 'badge-error'"
                                              th:text="${s.isCorrect ? '정답' : '오답'}">정답</span>
                                    </td>
                                    <td class="text-xs text-base-content/60"
                                        th:text="${s.submittedAt != null ? #temporals.format(s.submittedAt, 'yyyy-MM-dd HH:mm') : '—'}">—</td>
                                </tr>
                                <tr th:if="${submissions == null or submissions.isEmpty()}">
                                    <td colspan="3" class="text-center text-base-content/40 py-12">
                                        <div class="flex flex-col items-center gap-2">
                                            <i data-lucide="inbox" class="size-8 opacity-30"></i>
                                            <span>제출 이력이 없습니다.</span>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 제재 이력 패널 -->
                    <div id="panel-suspend" class="p-4 hidden">
                        <div class="overflow-x-auto">
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th class="w-40">일시</th>
                                    <th class="w-24">액션</th>
                                    <th>사유</th>
                                    <th class="w-40">만료일</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="h : ${member.suspendHistories}">
                                    <td class="text-xs text-base-content/60"
                                        th:text="${#temporals.format(h.actedAt, 'yyyy-MM-dd HH:mm')}">—</td>
                                    <td>
                                        <span class="badge badge-sm font-semibold"
                                              th:classappend="${h.action.name() == 'SUSPENDED'} ? 'badge-error' : 'badge-success'"
                                              th:text="${h.action.name()}">SUSPENDED</span>
                                    </td>
                                    <td class="text-xs" th:text="${h.reason != null ? h.reason : '—'}">—</td>
                                    <td class="text-xs text-base-content/60"
                                        th:text="${h.suspendUntil != null ? #temporals.format(h.suspendUntil, 'yyyy-MM-dd HH:mm') : '—'}">—</td>
                                </tr>
                                <tr th:if="${member.suspendHistories.isEmpty()}">
                                    <td colspan="4" class="text-center text-base-content/40 py-12">
                                        <div class="flex flex-col items-center gap-2">
                                            <i data-lucide="shield-check" class="size-8 opacity-30"></i>
                                            <span>제재 이력이 없습니다.</span>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 제재 모달 -->
    <dialog id="suspendModal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                <i data-lucide="shield-ban" class="size-5 text-error"></i>회원 제재
            </h3>
            <div class="form-control mb-4">
                <label class="label"><span class="label-text font-medium">제재 사유</span></label>
                <textarea id="suspendReason" class="textarea textarea-bordered w-full" rows="3"
                          placeholder="제재 사유를 입력하세요 (선택)"></textarea>
            </div>
            <div class="form-control mb-6">
                <label class="label"><span class="label-text font-medium">제재 만료 일시 <span class="text-error">*</span></span></label>
                <input type="datetime-local" id="suspendUntil" class="input input-bordered w-full"/>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-ghost">취소</button>
                </form>
                <button class="btn btn-error gap-2" onclick="suspendMember()">
                    <i data-lucide="shield-ban" class="size-4"></i>제재 적용
                </button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>닫기</button></form>
    </dialog>

</th:block>

<th:block layout:fragment="js">
    <script>
        lucide.createIcons();

        const memberUuid = '[[${member.memberUuid}]]';

        // 탭 전환
        function switchTab(tab) {
            ['submission', 'suspend'].forEach(t => {
                document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
                document.getElementById('tab-' + t).classList.toggle('tab-active', t === tab);
            });
        }

        function suspendMember() {
            const reason = document.getElementById('suspendReason').value;
            const suspendUntil = document.getElementById('suspendUntil').value;
            if (!suspendUntil) {
                alert('제재 만료 일시를 입력해주세요.');
                return;
            }
            fetch(`/admin/members/${memberUuid}/suspend`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ reason, suspendUntil: suspendUntil + ':00' })
            }).then(res => {
                if (res.ok) location.reload();
                else alert('제재 처리 중 오류가 발생했습니다.');
            });
        }

        function unsuspendMember() {
            if (!confirm('제재를 해제하시겠습니까?')) return;
            fetch(`/admin/members/${memberUuid}/unsuspend`, { method: 'POST' })
                .then(res => {
                    if (res.ok) location.reload();
                    else alert('해제 처리 중 오류가 발생했습니다.');
                });
        }
    </script>
</th:block>
</html>
